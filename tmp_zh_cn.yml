# 颜色代码参考
# &0 黑色    &8 深灰色
# &1 深蓝色  &9 蓝色
# &2 深绿色  &a 绿色
# &3 深青色  &b 青色
# &4 深红色  &c 红色
# &5 深紫色  &d 粉色
# &6 金色    &e 黄色
# &7 灰色    &f 白色
# &k 随机字符 &l 粗体
# &m 删除线  &n 下划线
# &o 斜体    &r 重置格式